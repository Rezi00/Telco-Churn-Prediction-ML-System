services:
  telco-churn-api:
    build: .
    container_name: telco-churn-api
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-telco
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - telco-churn-api

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-telco
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
